<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CCC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g transform="translate(20, 10)">
    <!-- Courthouse -->
    <polygon points="150,50 250,50 270,100 170,100" fill="#CCC" transform="translate(0, 50)"/>
    <polygon points="170,100 270,100 270,200 170,200" fill="#CCC" transform="translate(0, 50)"/>
    <polygon points="150,50 170,100 170,200 150,150" fill="#333" transform="translate(0, 50)"/>
    <polygon points="250,50 270,100 270,200 250,150" fill="#333" transform="translate(0, 50)"/>

    <rect x="170" y="100" width="20" height="100" fill="#FFF" transform="translate(0, 50)"/>
    <rect x="230" y="100" width="20" height="100" fill="#FFF" transform="translate(0, 50)"/>

    <polygon points="150,150 170,200 270,200 250,150" fill="#CCC" transform="translate(0, 50)"/>
    <polygon points="150,150 250,150 250,250 150,250" fill="#CCC" transform="translate(0, 50)"/>
    <polygon points="150,250 170,200 170,300 150,350" fill="#333" transform="translate(0, 50)"/>
    <polygon points="250,150 270,200 270,300 250,250" fill="#333" transform="translate(0, 50)"/>
    <polygon points="170,200 270,200 270,300 170,300" fill="#CCC" transform="translate(0, 50)"/>

    <!-- Badge -->
    <polygon points="0,100 50,50 100,100 50,150" fill="#1E3A5F"/>
    <polygon points="50,50 100,100 100,200 50,150" fill="#1E3A5F"/>
    <polygon points="0,100 50,50 50,150 0,200" fill="#1E3A5F"/>
    <polygon points="0,200 50,150 100,200 50,250" fill="#1E3A5F"/>
    <polygon points="0,200 0,100 50,150" fill="#333"/>
    <polygon points="100,100 100,200 50,150" fill="#333"/>

    <polygon points="10,110 40,80 70,110 40,140" fill="#FFF"/>
    <polygon points="40,80 70,110 70,170 40,140" fill="#FFF"/>
    <polygon points="10,110 40,80 40,140 10,170" fill="#FFF"/>
    <polygon points="10,170 40,140 70,170 40,200" fill="#FFF"/>

    <polygon points="20,120 40,100 60,120 40,140" fill="#1E3A5F"/>
    <polygon points="40,100 60,120 60,160 40,140" fill="#1E3A5F"/>
    <polygon points="20,120 40,100 40,140 20,160" fill="#1E3A5F"/>
    <polygon points="20,160 40,140 60,160 40,180" fill="#1E3A5F"/>
  </g>
</svg>