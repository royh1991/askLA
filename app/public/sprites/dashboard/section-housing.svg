<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <polygon id="isometric-tile" points="0,10 20,0 40,10 20,20"/>
    <g id="crane-arm">
      <rect x="0" y="0" width="100" height="5" fill="#333"/>
      <rect x="0" y="5" width="5" height="15" fill="#333"/>
      <rect x="95" y="5" width="5" height="15" fill="#333"/>
      <rect x="0" y="20" width="100" height="5" fill="#333"/>
    </g>
  </defs>

  <g transform="translate(200,200) scale(5)">
    <g transform="translate(-20,-10)">

      <polygon points="20,0 40,10 40,50 20,40" fill="#333"/>
      <polygon points="0,10 20,0 20,40 0,50" fill="#333"/>
      <polygon points="0,50 40,50 40,70 0,70" fill="#CCC"/>

      <polygon points="40,10 60,20 60,60 40,50" fill="#000"/>
      <polygon points="20,40 60,40 60,60 20,60" fill="#000"/>
      <polygon points="60,20 80,10 80,50 60,60" fill="#00B894"/>
      <polygon points="60,60 80,50 80,70 60,70" fill="#00B894"/>

      <polygon points="40,50 80,50 80,70 40,70" fill="#FFF"/>
      <polygon points="0,50 40,50 40,70 0,70" fill="#FFF"/>

      <g transform="translate(60,-5)">
        <rect x="0" y="0" width="10" height="10" fill="#333"/>
        <rect x="0" y="10" width="10" height="10" fill="#333"/>
        <rect x="0" y="20" width="10" height="10" fill="#333"/>
        <rect x="0" y="30" width="10" height="10" fill="#333"/>
        <rect x="0" y="40" width="10" height="10" fill="#333"/>
        <rect x="0" y="50" width="10" height="10" fill="#333"/>

        <g transform="translate(10,10)">
          <rect x="0" y="0" width="2" height="10" fill="#333"/>
          <rect x="8" y="0" width="2" height="10" fill="#333"/>
          <circle cx="5" cy="12" r="3" fill="#333"/>
          <use href="#crane-arm" transform="translate(5,15) rotate(45)"/>
        </g>
      </g>
    </g>
  </g>
</svg>