<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(200,200) scale(0.8)">

    <!-- Ledger Book -->
    <polygon points="-70,-30 -70,70 70,100 70,0" fill="#333"/>
    <polygon points="-70,-30 70,0 70,-100 -70,-70" fill="#CCC"/>
    <polygon points="-70,70 70,100 70,0 -70,-30" fill="#333"/>

    <!-- Page 1 -->
    <polygon points="-60,-20 -60,60 60,90 60,-10" fill="#FFF"/>

    <!-- Warning Triangles -->
    <polygon points="-50,50 -40,50 -45,40" fill="#D63031"/>
    <polygon points="40,80 50,80 45,70" fill="#D63031"/>

    <!-- Page 2 -->
    <polygon points="-60,-60 -60,20 60,50 60,-50" fill="#FFF"/>

    <!-- Magnifying Glass Handle -->
    <polygon points="0,-150 10,-150 10,-100 0,-100" fill="#000"/>

    <!-- Magnifying Glass Frame -->
    <polygon points="-30,-100 -40,-90 -40,-50 -30,-40" fill="#000"/>
    <polygon points="30,-100 40,-90 40,-50 30,-40" fill="#000"/>
    <polygon points="-30,-40 30,-40 40,-50 -40,-50" fill="#000"/>
    <polygon points="-40,-90 40,-90 30,-100 -30,-100" fill="#000"/>

    <!-- Magnifying Glass Lens -->
    <polygon points="-30,-50 -30,-90 30,-90 30,-50" fill="#CCC" opacity="0.3"/>

  </g>
</svg>